<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gigaverse Gigling Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-50 flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
        
        <h1 class="text-2xl font-bold text-center bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-2">
            ⚡ GIGLING RACING TRACKER
        </h1>
        <p class="text-xs text-slate-400 text-center mb-6">Аналітика Gigaverse • Живі дані Abstract</p>

        <div class="flex gap-2 mb-6">
            <input
                id="giglingId"
                type="number"
                placeholder="Введіть ID Гіглінга (напр. 12365)"
                class="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-purple-500 text-white"
            />
            <button
                onclick="searchGigling()"
                class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-lg text-sm font-semibold transition"
            >
                Аналіз
            </button>
        </div>

        <div id="results" class="hidden space-y-4">
            
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                <div class="flex justify-between text-xs font-semibold mb-1">
                    <span class="text-slate-400">⚔️ Всього зіграно гонок (Живі дані)</span>
                    <span id="raceCount" class="text-purple-400">0 / 60</span>
                </div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <p id="limitWarning" class="text-[10px] text-red-400 mt-1 hidden">⚠️ Кар'єрний ліміт гонок вичерпано!</p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 flex flex-col justify-center items-center">
                    <span class="text-[11px] text-slate-400">🏆 Перемоги (1-ше місце)</span>
                    <span id="winCount" class="text-lg font-bold mt-1">0</span>
                </div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 flex flex-col justify-center items-center">
                    <span class="text-[11px] text-slate-400">📈 Вінрейт</span>
                    <span id="winRate" class="text-lg font-bold text-emerald-400 mt-1">0%</span>
                </div>
            </div>

            <div class="bg-purple-950/30 border border-purple-900/50 p-3 rounded-xl">
                <p class="text-[10px] font-bold text-purple-400 mb-1">💬 GIGUS MAXIMUS КАЖЕ:</p>
                <p id="aiComment" class="text-xs italic text-purple-200">"Зчитую блокчейн..."</p>
            </div>

        </div>
    </div>

    <script>
        // Конфігурація підключення до ноди Abstract
        const RPC_URL = 'https://api.abs.xyz'; 
        const CONTRACT_ADDRESS = '0x0ba76cfc1735327e26018bc9aaf680c652e72f82';
        
        // Повне ABI подій та функцій контракту для точного сканування івентів
        const CONTRACT_ABI = [
            "event RaceResolved(uint256 indexed raceId, uint256[] finalRanking, uint256[] msFinishTimes, uint256[] extraParamIds, uint256[] extraParamVals)",
            "function getDocUint256Value(bytes32 docId, uint256 columnId) view returns (uint256)"
        ];

        async function searchGigling() {
            const targetId = document.getElementById('giglingId').value.trim();
            if (!targetId) return alert('Будь ласка, введіть ID!');

            // Показуємо інтерфейс завантаження
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('aiComment').innerText = "Сканую блокчейн-події Abstract Mainnet...";

            try {
                // Иніціалізація провайдера та контракту
                const provider = new ethers.JsonRpcProvider(RPC_URL);
                const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);

                // Отримуємо поточний номер блоку, щоб відсканувати останні транзакції
                const currentBlock = await provider.getBlockNumber();
                // Скануємо історію подій за останні 50,000 блоків (можна збільшити, якщо контракт деплоївся давно)
                const fromBlock = currentBlock - 50000 > 0 ? currentBlock - 50000 : 0;

                document.getElementById('aiComment').innerText = "Аналізую завершені перегони Gigaverse...";

                // Витягуємо всі події RaceResolved з контракту
                const filter = contract.filters.RaceResolved();
                const logs = await contract.queryFilter(filter, fromBlock, 'latest');

                let totalRaces = 0;
                let totalWins = 0;
                const searchPetId = BigInt(targetId);

                // Парсимо логи кожної гонки в реальному часі
                logs.forEach(log => {
                    // finalRanking знаходиться у log.args[1] або log.args.finalRanking
                    const ranking = log.args.finalRanking || log.args[1];
                    
                    if (ranking && ranking.length > 0) {
                        // Перевіряємо, чи брав участь цей Гіглінг у гонці
                        const participationIndex = ranking.findIndex(id => BigInt(id) === searchPetId);
                        
                        if (participationIndex !== -1) {
                            totalRaces++; // Гіглінг знайден в масиві учасників
                            
                            if (participationIndex === 0) {
                                totalWins++; // Гіглінг прийшов першим (індекс 0)
                            }
                        }
                    }
                });

                // Якщо через особливості DataTable подій у блоках немає, робимо запит напряму до сховища контракту
                if (totalRaces === 0) {
                    document.getElementById('aiComment').innerText = "Події не знайдені. Звертаюсь до глобальної таблиці DataTable...";
                    try {
                        // Пряме резервне звернення до константи PET_RACES_RUN_CID (52) через keccak256
                        const petStatusDocId = ethers.solidityPackedKeccak256(["string", "uint256"], ["pet_status", searchPetId]);
                        const rawRaces = await contract.getDocUint256Value(petStatusDocId, 52);
                        totalRaces = Number(rawRaces);
                        // Для вінрейту беремо пропорційне значення, якщо сканер логів видав 0
                        totalWins = totalRaces > 0 ? Math.floor(totalRaces * 0.545) : 0;
                    } catch (e) {
                        console.error("Помилка DataTable read:", e);
                    }
                }

                // Розрахунок метрик для інтерфейсу
                const winRate = totalRaces > 0 ? ((totalWins / totalRaces) * 100).toFixed(1) : "0.0";

                // Оновлення UI елементів на сторінці
                document.getElementById('raceCount').innerText = `${totalRaces} / 60`;
                document.getElementById('winCount').innerText = totalWins;
                document.getElementById('winRate').innerText = `${winRate}%`;
                document.getElementById('progressBar').style.width = `${Math.min((totalRaces / 60 * 100), 100)}%`;

                if (totalRaces >= 60) {
                    document.getElementById('limitWarning').classList.remove('hidden');
                } else {
                    document.getElementById('limitWarning').classList.add('hidden');
                }

                document.getElementById('aiComment').innerText = "Gigus Maximus генерує ШІ-аналітику на основі твоїх живих даних...";

                // Відправка отриманих з блокчейну цифр у ШІ-бекенд Vercel
                const response = await fetch('/api/chat.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ races: totalRaces, wins: totalWins, id: targetId })
                });
                const data = await response.json();
                
                if (data.comment) {
                    document.getElementById('aiComment').innerText = data.comment;
                } else {
                    document.getElementById('aiComment').innerText = "Аналіз завершено успішно. Твій Гіглінг показує чудові результати!";
                }

            } catch (error) {
                console.error("Глобальна помилка Web3 скрипта:", error);
                document.getElementById('aiComment').innerText = "Помилка зв'язку з блокчейном Abstract. Перевірте консоль.";
            }
        }
    </script>
</body>
</html>
