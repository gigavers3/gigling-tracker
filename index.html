<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gigaverse Real Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-50 flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
        <h1 class="text-xl font-bold text-center bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-4">
            📊 REAL-TIME ONCHAIN SCANNER
        </h1>

        <div class="flex gap-2 mb-6">
            <input id="giglingId" type="number" placeholder="Введіть ID Гіглінга" class="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white"/>
            <button onclick="scanOnchainLogs()" id="scanBtn" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-lg text-sm font-semibold transition">Сканувати</button>
        </div>

        <div id="results" class="hidden space-y-4">
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                <div class="flex justify-between text-xs font-semibold mb-1">
                    <span class="text-slate-400">⚔️ Знайдено гонок в івентах:</span>
                    <span id="raceCount" class="text-purple-400">0</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-center">
                    <span class="text-[11px] text-slate-400">🏆 Перемоги</span>
                    <span id="winCount" class="text-lg font-bold block mt-1">0</span>
                </div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-center">
                    <span class="text-[11px] text-slate-400">📈 Вінрейт</span>
                    <span id="winRate" class="text-lg font-bold text-emerald-400 block mt-1">0%</span>
                </div>
            </div>
            <p id="statusText" class="text-xs italic text-slate-400 text-center mt-2"></p>
        </div>
    </div>

    <script>
        const RPC_URL = 'https://api.abs.xyz';
        const CONTRACT_ADDRESS = '0x0ba76cfc1735327e26018bc9aaf680c652e72f82';

        // Сигнатура реального івенту завершення гонки (можна знайти в експлорері Abstract)
        const ABI = [
            "event RaceResolved(uint256 indexed raceId, uint256[] finalRanking)"
        ];

        async function scanOnchainLogs() {
            const idInput = document.getElementById('giglingId').value.trim();
            if (!idInput) return alert('Введіть ID!');

            const btn = document.getElementById('scanBtn');
            btn.disabled = true;
            btn.innerText = "Сканування...";
            
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('statusText').innerText = "Починаю глибоке сканування блоків Abstract RPC...";

            try {
                const provider = new ethers.JsonRpcProvider(RPC_URL);
                const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
                
                const targetId = BigInt(idInput);
                const currentBlock = await provider.getBlockNumber();
                
                // Беремо зріз останніх 50,000 блоків, де йдуть активні перегони
                const fromBlock = currentBlock - 50000 > 0 ? currentBlock - 50000 : 0;
                
                const filter = contract.filters.RaceResolved();
                const logs = await contract.queryFilter(filter, fromBlock, 'latest');

                let totalRaces = 0;
                let totalWins = 0;

                document.getElementById('statusText').innerText = `Знайдено ${logs.length} загальних івентів. Фільтрую під ID #${idInput}...`;

                logs.forEach(log => {
                    const ranking = log.args.finalRanking;
                    if (ranking) {
                        // Перевіряємо чи брав участь наш пет
                        const index = ranking.findIndex(id => BigInt(id) === targetId);
                        if (index !== -1) {
                            totalRaces++;
                            if (index === 0) totalWins++; // Перше місце в масиві — переможець
                        }
                    }
                });

                const rate = totalRaces > 0 ? ((totalWins / totalRaces) * 100).toFixed(1) : "0.0";

                document.getElementById('raceCount').innerText = totalRaces;
                document.getElementById('winCount').innerText = totalWins;
                document.getElementById('winRate').innerText = `${rate}%`;
                document.getElementById('statusText').innerText = "Аналіз логів завершено. Дані отримано безпосередньо з емітованих івентів контракту!";

            } catch (error) {
                console.error(error);
                document.getElementById('statusText').innerText = "Помилка читання логів з RPC. Можливо, встановлено ліміт на запити (Rate Limit).";
            } finally {
                btn.disabled = false;
                btn.innerText = "Сканувати";
            }
        }
    </script>
</body>
</html>
